<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAM Trip Tool - Premium Dashboard</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Trip Tool">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <!-- Google Fonts Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
            
            /* Dark Mode Colors (Default) */
            --bg-app: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #0f172a;
            --border-color: #334155;
            --border-focus: #38bdf8;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            
            --accent-primary: #6366f1;
            --accent-primary-gradient: linear-gradient(135deg, #6366f1, #3b82f6);
            --accent-success: #10b981;
            --accent-success-gradient: linear-gradient(135deg, #10b981, #059669);
            --accent-danger: #ef4444;
            --accent-danger-gradient: linear-gradient(135deg, #ef4444, #dc2626);
            --accent-info: #0ea5e9;
            --accent-info-gradient: linear-gradient(135deg, #0ea5e9, #2563eb);
            --accent-warning: #f59e0b;
            
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --shadow-glow: 0 0 15px rgba(99, 102, 241, 0.15);
            
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 16px;
            --transition-fast: 0.15s ease;
            --transition-normal: 0.25s ease;
        }

        :root.theme-light {
            /* Light Mode Colors */
            --bg-app: #f1f5f9;
            --bg-card: #ffffff;
            --bg-input: #f8fafc;
            --border-color: #cbd5e1;
            --border-focus: #4f46e5;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #64748b;
            
            --shadow-glow: 0 0 15px rgba(79, 70, 229, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: background-color var(--transition-normal), border-color var(--transition-normal), color var(--transition-normal);
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg-app);
            color: var(--text-primary);
            padding: 20px;
            min-height: 100vh;
            line-height: 1.5;
        }

        .app-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* App Header */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--border-color);
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .truck-icon {
            width: 32px;
            height: 32px;
            color: var(--accent-primary);
        }

        .header-title {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--text-primary), var(--accent-primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .version-pill {
            font-size: 11px;
            font-weight: 600;
            background: var(--border-color);
            color: var(--text-secondary);
            padding: 2px 8px;
            border-radius: 12px;
            vertical-align: middle;
            margin-left: 6px;
            -webkit-text-fill-color: initial;
        }

        .icon-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: transform var(--transition-fast), border-color var(--transition-fast);
        }

        .icon-btn:hover {
            transform: scale(1.05);
            border-color: var(--border-focus);
            box-shadow: var(--shadow-glow);
        }

        .icon-btn svg {
            width: 20px;
            height: 20px;
        }

        /* Sun / Moon icons in toggler */
        .moon-icon {
            display: none;
        }
        .sun-icon {
            display: block;
            color: #f59e0b;
        }
        .theme-light .moon-icon {
            display: block;
            color: #f59e0b;
        }
        .theme-light .sun-icon {
            display: none;
        }

        /* Card Sections */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }

        @media (max-width: 768px) {
            .card-grid {
                grid-template-columns: 1fr;
            }
            body {
                padding: 10px;
            }
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-md);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--accent-primary-gradient);
            opacity: 0.8;
        }

        .card-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Form elements */
        .form-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 16px;
        }

        .form-row.full-width, .form-group.full-width {
            grid-column: span 2;
        }

        @media (max-width: 480px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            .form-row.full-width, .form-group.full-width {
                grid-column: span 1;
            }
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
        }

        input, select {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            font-family: var(--font-sans);
            font-size: 14px;
            padding: 10px 14px;
            border-radius: var(--radius-md);
            width: 100%;
            outline: none;
            box-shadow: var(--shadow-sm);
            transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
        }

        input:focus, select:focus {
            border-color: var(--border-focus);
            box-shadow: var(--shadow-glow);
        }

        .flex-row {
            display: flex;
            gap: 8px;
        }

        /* Buttons */
        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 10px;
            grid-column: span 2;
        }

        .btn-group-3 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn-span-2 {
            grid-column: span 2;
        }

        @media (max-width: 580px) {
            .btn-group, .btn-group-3 {
                grid-template-columns: 1fr;
            }
            .btn-span-2 {
                grid-column: span 1;
            }
        }

        button.btn {
            font-family: var(--font-sans);
            font-size: 15px;
            font-weight: 600;
            padding: 14px 24px;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #ffffff;
            box-shadow: var(--shadow-md);
            transition: transform var(--transition-fast), filter var(--transition-fast), box-shadow var(--transition-fast);
        }

        button.btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
            box-shadow: var(--shadow-lg);
        }

        button.btn:active {
            transform: translateY(0);
            filter: brightness(0.95);
        }

        button.btn-primary {
            background: var(--accent-primary-gradient);
            box-shadow: 0 4px 14px rgba(99, 102, 241, 0.4);
        }

        button.btn-success {
            background: var(--accent-success-gradient);
            box-shadow: 0 4px 14px rgba(16, 185, 129, 0.4);
        }

        button.btn-danger {
            background: var(--accent-danger-gradient);
            box-shadow: 0 4px 14px rgba(239, 68, 68, 0.4);
        }

        button.btn-secondary {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        button.btn-secondary:hover {
            border-color: var(--border-focus);
            color: var(--border-focus);
        }

        /* Alert/Notice banner */
        .alert-banner {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid var(--accent-warning);
            border-radius: var(--radius-md);
            color: var(--accent-warning);
            padding: 12px 16px;
            font-size: 13px;
            margin-bottom: 20px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .alert-banner svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        /* Coordinates Toast Alert */
        #coord-toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--accent-primary-gradient);
            color: #fff;
            padding: 16px 20px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            z-index: 1000;
            font-size: 14px;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity var(--transition-normal), transform var(--transition-normal);
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        /* Preview UI styling */
        .preview-container {
            display: none;
        }

        .canvas-grid {
            display: flex;
            flex-direction: column;
            gap: 25px;
            align-items: center;
            margin-bottom: 25px;
            width: 100%;
        }

        .canvas-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 16px;
            box-shadow: var(--shadow-md);
            width: 100%;
            max-width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .canvas-card h4 {
            align-self: flex-start;
            margin-bottom: 12px;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .canvas-wrapper {
            width: 100%;
            max-width: 100%;
            overflow-x: auto;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
        }

        canvas {
            display: block;
            max-width: 100%;
            height: auto;
            cursor: crosshair;
        }

        /* Reports styling */
        .report-container {
            display: none;
        }

        .report-section-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            margin-bottom: 25px;
        }

        @media (max-width: 850px) {
            .report-section-grid {
                grid-template-columns: 1fr;
            }
        }

        .report-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-md);
        }

        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 15px;
        }

        @media (max-width: 480px) {
            .kpi-grid {
                grid-template-columns: 1fr;
            }
        }

        .kpi-card {
            background: var(--bg-app);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            box-shadow: var(--shadow-sm);
        }

        .kpi-card.highlight {
            border-color: var(--accent-primary);
            box-shadow: var(--shadow-glow);
        }

        .kpi-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
        }

        .kpi-value {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .kpi-unit {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            margin-left: 2px;
        }
    </style>
</head>

<body>

    <div class="app-container">
        
        <!-- Header -->
        <header class="app-header">
            <div class="header-logo">
                <svg class="truck-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="1" y="3" width="15" height="13" rx="2" ry="2" />
                    <polygon points="16 8 20 8 23 11 23 16 16 16 16 8" />
                    <circle cx="5.5" cy="18.5" r="2.5" />
                    <circle cx="18.5" cy="18.5" r="2.5" />
                </svg>
                <span class="header-title">PAM Trip Tool <span class="version-pill">v6</span></span>
            </div>
            <div class="header-actions">
                <button id="themeToggleBtn" class="icon-btn" aria-label="Toggle Theme" onclick="toggleTheme()">
                    <!-- Sun Icon (shown in dark theme) -->
                    <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <!-- Moon Icon (shown in light theme) -->
                    <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Form Editor UI -->
        <div id="form-ui">
            
            <div class="card-grid">
                
                <!-- Card 1: Trip Basics -->
                <div class="card">
                    <h3 class="card-title">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" style="color: var(--accent-primary);">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                        </svg>
                        Trip Basics
                    </h3>
                    <div class="form-row">
                        <div class="form-group"><label>Date</label><input type="date" id="date"></div>
                        <div class="form-group"><label>Trip / Order #</label><input type="text" id="trip" placeholder="E.g. 12345"></div>
                        <div class="form-group"><label>Truck #</label><input type="text" id="truck" placeholder="E.g. 9876"></div>
                        <div class="form-group"><label>Trailer #</label><input type="text" id="trailer" placeholder="E.g. 5310"></div>
                        <div class="form-group full-width"><label>Driver Code</label><input type="text" id="driverCode" style="text-transform: uppercase;" placeholder="E.g. ABCD"></div>
                    </div>
                </div>

                <!-- Card 2: Routing & Miles -->
                <div class="card">
                    <h3 class="card-title">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" style="color: var(--accent-primary);">
                            <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"></polygon>
                            <line x1="9" y1="3" x2="9" y2="18"></line>
                            <line x1="15" y1="6" x2="15" y2="21"></line>
                        </svg>
                        Routing & Miles
                    </h3>
                    <div class="form-row">
                        <div class="form-group full-width">
                            <label>Shipper Name</label>
                            <input type="text" id="shipper" placeholder="Enter Shipper Name">
                        </div>
                        <div class="form-group">
                            <label>Origin</label>
                            <div class="flex-row">
                                <input type="text" id="originCity" placeholder="City" style="flex: 2;">
                                <select id="originState" style="flex: 1;"></select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Destination</label>
                            <div class="flex-row">
                                <input type="text" id="destCity" placeholder="City" style="flex: 2;">
                                <select id="destState" style="flex: 1;"></select>
                            </div>
                        </div>
                        <div class="form-group"><label>Beg. Odometer</label><input type="number" id="begOdo" placeholder="0"></div>
                        <div class="form-group"><label>End Odometer</label><input type="number" id="endOdo" placeholder="0"></div>
                    </div>
                </div>

                <!-- Card 3: Fuel Purchases -->
                <div class="card full-width" style="grid-column: span 2;">
                    <h3 class="card-title">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" style="color: var(--accent-primary);">
                            <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                        </svg>
                        Fuel Purchases
                    </h3>
                    <div class="form-row">
                        <div class="form-group full-width">
                            <label>Fuel Stops Count</label>
                            <select id="fuelCount" onchange="updateFuelInputs()">
                                <option value="0">0 stops</option>
                                <option value="1">1 stop</option>
                                <option value="2">2 stops</option>
                                <option value="3">3 stops</option>
                            </select>
                        </div>
                        <div id="fuelInputs" class="full-width grid-container" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; width: 100%;"></div>
                    </div>
                </div>

                <!-- Buttons Footer -->
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="renderPreview()">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                        Preview Sheets
                    </button>
                    <button class="btn btn-secondary" onclick="generateReports()">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="20" x2="18" y2="10"></line>
                            <line x1="12" y1="20" x2="12" y2="4"></line>
                            <line x1="6" y1="20" x2="6" y2="14"></line>
                        </svg>
                        View Reports
                    </button>
                </div>

            </div>
        </div>

        <!-- Preview UI -->
        <div id="preview-ui" class="preview-container">
            <div class="card" style="margin-bottom: 25px;">
                <div class="card-title">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" style="color: var(--accent-primary);">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                    </svg>
                    Sheet Previews
                </div>
                
                <div class="alert-banner">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="16" x2="12" y2="12"></line>
                        <line x1="12" y1="8" x2="12.01" y2="8"></line>
                    </svg>
                    <span><strong>Pro-Tip:</strong> Tap anywhere on the sheet images below to copy the exact X and Y coordinates to your clipboard automatically!</span>
                </div>

                <div class="canvas-grid">
                    <div class="canvas-card">
                        <h4>Cover Sheet Preview (CS)</h4>
                        <div class="canvas-wrapper">
                            <canvas id="canvasCover"></canvas>
                        </div>
                    </div>
                    
                    <div class="canvas-card">
                        <h4>Trip Sheet Preview (TS)</h4>
                        <div class="canvas-wrapper">
                            <canvas id="canvasTrip"></canvas>
                        </div>
                    </div>
                </div>
                
                <div class="btn-group">
                    <button class="btn btn-success" onclick="downloadJPEGs()">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                        Save Sheets (TS & CS)
                    </button>
                    <button class="btn btn-secondary" onclick="location.reload()">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="15 18 9 12 15 6"></polyline>
                        </svg>
                        Back to Edit
                    </button>
                </div>
            </div>
        </div>

        <!-- Report UI -->
        <div id="report-ui" class="report-container">
            <div class="report-section-grid">
                <div class="report-card">
                    <div class="card-title">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" style="color: var(--accent-success);">
                            <line x1="18" y1="20" x2="18" y2="10"></line>
                            <line x1="12" y1="20" x2="12" y2="4"></line>
                            <line x1="6" y1="20" x2="6" y2="14"></line>
                        </svg>
                        Trip Analysis
                    </div>
                    <div id="currentTripReport"></div>
                </div>
                
                <div class="report-card">
                    <div class="card-title">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" style="color: var(--accent-primary);">
                            <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                        </svg>
                        Year-to-Date (YTD) Report
                    </div>
                    <div id="ytdReport"></div>
                </div>
            </div>

            <div class="card" style="margin-bottom: 25px;">
                <div class="btn-group-3">
                    <button class="btn btn-success" onclick="saveTripToYTD()">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                            <polyline points="17 21 17 13 7 13 7 21"></polyline>
                            <polyline points="7 3 7 8 15 8"></polyline>
                        </svg>
                        Save Trip to YTD
                    </button>
                    <button class="btn btn-danger" onclick="clearYTD()">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        </svg>
                        Clear YTD Data
                    </button>
                    <button class="btn btn-secondary btn-span-2" onclick="location.reload()">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="15 18 9 12 15 6"></polyline>
                        </svg>
                        Back to Form Editor
                    </button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registered'))
                    .catch(err => console.log('Service Worker registration failed', err));
            });
        }

        const usStates = ["", "AL", "AK", "AZ", "AR", "CA", "CO", "CT", "DE", "FL", "GA", "HI", "ID", "IL", "IN", "IA", "KS", "KY", "LA", "ME", "MD", "MA", "MI", "MN", "MS", "MO", "MT", "NE", "NV", "NH", "NJ", "NM", "NY", "NC", "ND", "OH", "OK", "OR", "PA", "RI", "SC", "SD", "TN", "TX", "UT", "VT", "VA", "WA", "WV", "WI", "WY"];

        function populateStates(selectId) {
            const select = document.getElementById(selectId);
            if (!select) return;
            select.innerHTML = '';
            usStates.forEach(st => {
                const opt = document.createElement('option');
                opt.value = st;
                opt.textContent = st || 'ST';
                select.appendChild(opt);
            });
        }

        window.onload = () => {
            initTheme();
            
            populateStates('originState');
            populateStates('destState');

            loadAllFields();

            // Set up auto-saving on interaction
            document.addEventListener('change', (e) => {
                if (e.target.id) {
                    localStorage.setItem(e.target.id, e.target.value);
                }
            });

            document.addEventListener('input', (e) => {
                if (e.target.id && (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT')) {
                    localStorage.setItem(e.target.id, e.target.value);
                }
            });

            // Canvas coordinate finder listeners
            ['canvasCover', 'canvasTrip'].forEach(id => {
                const canvas = document.getElementById(id);
                if (canvas) {
                    canvas.addEventListener('click', function (event) {
                        const rect = canvas.getBoundingClientRect();
                        const scaleX = canvas.width / rect.width;
                        const scaleY = canvas.height / rect.height;
                        const x = Math.round((event.clientX - rect.left) * scaleX);
                        const y = Math.round((event.clientY - rect.top) * scaleY);
                        showCoordinateToast(x, y);
                    });
                }
            });
        };

        // Theme Toggle Control
        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            if (savedTheme === 'light') {
                document.documentElement.classList.add('theme-light');
            } else {
                document.documentElement.classList.remove('theme-light');
            }
            updateThemeButton();
        }

        function toggleTheme() {
            const isLight = document.documentElement.classList.toggle('theme-light');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            updateThemeButton();
        }

        function updateThemeButton() {
            const isLight = document.documentElement.classList.contains('theme-light');
            const sunIcon = document.querySelector('.sun-icon');
            const moonIcon = document.querySelector('.moon-icon');
            if (sunIcon && moonIcon) {
                if (isLight) {
                    sunIcon.style.display = 'none';
                    moonIcon.style.display = 'block';
                } else {
                    sunIcon.style.display = 'block';
                    moonIcon.style.display = 'none';
                }
            }
        }

        // Custom Coordinates Toast
        function showCoordinateToast(x, y) {
            let toast = document.getElementById('coord-toast');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'coord-toast';
                document.body.appendChild(toast);
            }
            toast.innerHTML = `
                <div style="font-weight: 700; display: flex; align-items: center; gap: 6px;">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
                        <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
                    </svg>
                    Coordinates Copied!
                </div>
                <div style="font-size: 13px; opacity: 0.9;">X: ${x} &nbsp;&bull;&nbsp; Y: ${y}</div>
            `;
            toast.style.opacity = '1';
            toast.style.transform = 'translateY(0)';
            
            navigator.clipboard.writeText(`X: ${x}, Y: ${y}`).catch(err => {});

            clearTimeout(toast.timeoutId);
            toast.timeoutId = setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(20px)';
            }, 3000);
        }

        function loadAllFields() {
            // Priority 1: Fuel Count (needed to build dynamic inputs)
            const fuelCount = localStorage.getItem('fuelCount') || '0';
            const fuelCountEl = document.getElementById('fuelCount');
            if (fuelCountEl) {
                fuelCountEl.value = fuelCount;
                updateFuelInputs();
            }

            // Priority 2: All other fields
            const inputs = document.querySelectorAll('input, select');
            inputs.forEach(input => {
                if (!input.id) return;
                const saved = localStorage.getItem(input.id);
                if (saved !== null) {
                    input.value = saved;
                }
            });

            // Special handling for date if empty
            const dateInput = document.getElementById('date');
            if (dateInput && !dateInput.value) {
                dateInput.valueAsDate = new Date();
            }
        }

        function updateFuelInputs() {
            const count = document.getElementById('fuelCount').value;
            const container = document.getElementById('fuelInputs');
            container.innerHTML = '';
            for (let i = 1; i <= count; i++) {
                container.innerHTML += `
                    <div class="form-row full-width" style="border-top: 1px solid var(--border-color); padding-top: 15px; margin-top: 15px; grid-column: span 2;">
                        <h4 style="font-size: 13px; font-weight: 700; color: var(--accent-primary); text-transform: uppercase; letter-spacing: 0.5px;">Fuel Stop #${i}</h4>
                    </div>
                    <div class="form-group">
                        <label>City & State</label>
                        <div class="flex-row">
                            <input type="text" id="fuelCity${i}" placeholder="City" style="flex: 2;">
                            <select id="fuelState${i}" style="flex: 1;"></select>
                        </div>
                    </div>
                    <div class="form-group"><label>Gallons</label><input type="number" step="0.1" id="fuelGal${i}" class="gallons" placeholder="0.0"></div>
                    <div class="form-group"><label>Total Cost ($)</label><input type="number" step="0.01" id="fuelCost${i}" class="costs" placeholder="0.00"></div>
                    <div class="form-group"><label>Odometer</label><input type="number" id="fuelOdo${i}" placeholder="Odo Reading"></div>
                `;
            }
            for (let i = 1; i <= count; i++) {
                populateStates(`fuelState${i}`);
            }

            // Restore previously saved inputs when count changes to avoid clearing filled stops
            const inputs = container.querySelectorAll('input, select');
            inputs.forEach(input => {
                if (!input.id) return;
                const saved = localStorage.getItem(input.id);
                if (saved !== null) {
                    input.value = saved;
                }
            });
        }

        function formatLocationString(cityId, stateId) {
            const city = document.getElementById(cityId)?.value.trim() || '';
            const state = document.getElementById(stateId)?.value || '';
            let res = city;
            if (city && state) res = `${city}, ${state}`;
            else res = city || state;
            return res.toUpperCase();
        }

        let currentTripData = {};

        function generateReports() {
            document.getElementById('form-ui').style.display = 'none';
            document.getElementById('report-ui').style.display = 'block';

            const begOdo = parseFloat(document.getElementById('begOdo').value) || 0;
            const endOdo = parseFloat(document.getElementById('endOdo').value) || 0;
            const miles = endOdo > begOdo ? endOdo - begOdo : 0;

            let totalGal = 0, totalCost = 0;
            document.querySelectorAll('.gallons').forEach(el => totalGal += parseFloat(el.value) || 0);
            document.querySelectorAll('.costs').forEach(el => totalCost += parseFloat(el.value) || 0);

            const mpg = totalGal > 0 ? (miles / totalGal).toFixed(2) : '0.00';
            const cpm = miles > 0 ? (totalCost / miles).toFixed(2) : '0.00';

            currentTripData = { miles, totalGal, totalCost };

            document.getElementById('currentTripReport').innerHTML = `
                <div class="kpi-grid">
                    <div class="kpi-card highlight">
                        <div class="kpi-label">Miles Driven</div>
                        <div class="kpi-value">${miles}<span class="kpi-unit">mi</span></div>
                    </div>
                    <div class="kpi-card">
                        <div class="kpi-label">Total Fuel</div>
                        <div class="kpi-value">${totalGal.toFixed(1)}<span class="kpi-unit">gal</span></div>
                    </div>
                    <div class="kpi-card">
                        <div class="kpi-label">Fuel Cost</div>
                        <div class="kpi-value">$${totalCost.toFixed(2)}</div>
                    </div>
                    <div class="kpi-card highlight">
                        <div class="kpi-label">Avg MPG</div>
                        <div class="kpi-value">${mpg}</div>
                    </div>
                    <div class="kpi-card full-width" style="grid-column: span 2;">
                        <div class="kpi-label">Cost Per Mile</div>
                        <div class="kpi-value">$${cpm}<span class="kpi-unit">/ mi</span></div>
                    </div>
                </div>
            `;

            loadYTDReport();
        }

        function saveTripToYTD() {
            let ytd = JSON.parse(localStorage.getItem('ytdData') || '{"miles":0, "gallons":0, "cost":0}');
            ytd.miles += currentTripData.miles;
            ytd.gallons += currentTripData.totalGal;
            ytd.cost += currentTripData.totalCost;
            localStorage.setItem('ytdData', JSON.stringify(ytd));
            alert("Trip saved to YTD totals!");
            loadYTDReport();
        }

        function loadYTDReport() {
            let ytd = JSON.parse(localStorage.getItem('ytdData') || '{"miles":0, "gallons":0, "cost":0}');
            const ytdMpg = ytd.gallons > 0 ? (ytd.miles / ytd.gallons).toFixed(2) : '0.00';
            const ytdCpm = ytd.miles > 0 ? (ytd.cost / ytd.miles).toFixed(2) : '0.00';

            document.getElementById('ytdReport').innerHTML = `
                <div class="kpi-grid">
                    <div class="kpi-card highlight">
                        <div class="kpi-label">YTD Miles</div>
                        <div class="kpi-value">${ytd.miles}<span class="kpi-unit">mi</span></div>
                    </div>
                    <div class="kpi-card">
                        <div class="kpi-label">YTD Fuel</div>
                        <div class="kpi-value">${ytd.gallons.toFixed(1)}<span class="kpi-unit">gal</span></div>
                    </div>
                    <div class="kpi-card">
                        <div class="kpi-label">YTD Fuel Cost</div>
                        <div class="kpi-value">$${ytd.cost.toFixed(2)}</div>
                    </div>
                    <div class="kpi-card highlight">
                        <div class="kpi-label">YTD Avg MPG</div>
                        <div class="kpi-value">${ytdMpg}</div>
                    </div>
                    <div class="kpi-card full-width" style="grid-column: span 2;">
                        <div class="kpi-label">YTD Cost Per Mile</div>
                        <div class="kpi-value">$${ytdCpm}<span class="kpi-unit">/ mi</span></div>
                    </div>
                </div>
            `;
        }

        function clearYTD() {
            if (confirm("Are you sure you want to erase all Year-to-Date data?")) {
                localStorage.removeItem('ytdData');
                loadYTDReport();
            }
        }

        async function renderPreview() {
            const driverCodeInput = document.getElementById('driverCode');
            if (driverCodeInput) {
                driverCodeInput.value = driverCodeInput.value.toUpperCase();
                localStorage.setItem('driverCode', driverCodeInput.value);
            }

            document.getElementById('form-ui').style.display = 'none';
            document.getElementById('preview-ui').style.display = 'block';
            await drawCover();
            await drawTrip();
        }

        async function drawCover() {
            const canvas = document.getElementById('canvasCover');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const img = new Image(); img.src = '4012.jpg'; await img.decode();
            canvas.width = img.width; canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
            ctx.font = "bold 43px Courier";

            ctx.fillText(document.getElementById('truck').value, 700, 780);
            ctx.fillText(document.getElementById('trip').value, 700, 972);
            ctx.fillText(document.getElementById('driverCode').value, 700, 1140);
            ctx.fillText(document.getElementById('trailer').value, 700, 1320);
        }

        async function drawTrip() {
            const canvas = document.getElementById('canvasTrip');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const img = new Image(); img.src = '4013.jpg'; await img.decode();
            canvas.width = img.width; canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
            ctx.font = "30px Arial";

            ctx.fillText(document.getElementById('trip').value, 149, 60);
            ctx.fillText(document.getElementById('truck').value, 512, 60);
            ctx.fillText(document.getElementById('trailer').value, 810, 60);
            ctx.fillText(document.getElementById('driverCode').value, 1187, 60);
            ctx.fillText(document.getElementById('date').value, 1155, 100);
            ctx.fillText(document.getElementById('shipper').value, 224, 100);
            ctx.fillText(document.getElementById('originCity').value, 613, 100);
            ctx.fillText(document.getElementById('originState').value, 954, 100);
            ctx.fillText(document.getElementById('begOdo').value, 388, 181);
            ctx.fillText(document.getElementById('endOdo').value, 380, 220);

            const rowHeight = 61;
            const originY = 476;
            const secondaryStartY = 537;

            // Origin row (formats city originCity in uppercase)
            ctx.fillText(formatLocationString('originCity'), 105, originY);
            ctx.fillText(formatLocationString('originState'), 415, originY);
            ctx.fillText("X", 548, originY);

            let currentY = secondaryStartY;

            const count = parseInt(document.getElementById('fuelCount').value);
            for (let i = 1; i <= count; i++) {
                ctx.fillText(formatLocationString(`fuelCity${i}`), 112, currentY);
                ctx.fillText(formatLocationString(`fuelState${i}`), 415, currentY);
                ctx.fillText("X", 1164, currentY);
                currentY += rowHeight;
            }

            // Destination row
            ctx.fillText(formatLocationString('destCity'), 112, currentY);
            ctx.fillText(formatLocationString('destState'), 415, currentY);
            ctx.fillText("X", 708, currentY);
        }

        function downloadJPEGs() {
            const tripNum = document.getElementById('trip').value || 'Unknown';
            const sheets = [
                { id: 'canvasCover', name: `CS-${tripNum}.jpg` },
                { id: 'canvasTrip', name: `TS-${tripNum}.jpg` }
            ];
            sheets.forEach(s => {
                const link = document.createElement('a');
                link.download = s.name;
                const canvas = document.getElementById(s.id);
                if (canvas) {
                    link.href = canvas.toDataURL("image/jpeg", 0.9);
                    link.click();
                }
            });
        }
    </script>
</body>

</html>
